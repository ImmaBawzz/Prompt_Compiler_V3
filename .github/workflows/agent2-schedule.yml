name: Agent2 Schedule

on:
  schedule:
    - cron: "0 * * * *"
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  agent2-cycle:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 * * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run single Agent2 cycle
        run: npm run agent2:run -- --single-cycle --skip-checks
        env:
          AGENT2_MEMORY_DB_PATH: ${{ runner.temp }}/agent2-memory.db
          AGENT2_ENABLE_CODEWRITER: "false"

  agent2-watchdog:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/30 * * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Seed one cycle entry
        run: npm run agent2:run -- --single-cycle --skip-checks
        env:
          AGENT2_MEMORY_DB_PATH: ${{ runner.temp }}/agent2-memory.db
          AGENT2_ENABLE_CODEWRITER: "false"
      - name: Run Agent2 watchdog
        run: npm run agent2:watchdog
        env:
          AGENT2_MEMORY_DB_PATH: ${{ runner.temp }}/agent2-memory.db
          AGENT2_CYCLE_INTERVAL_MS: "1200000"

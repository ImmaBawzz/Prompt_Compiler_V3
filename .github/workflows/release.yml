name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-test-and-release:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & verify
        run: npm run verify

      - name: Package VSIX
        working-directory: apps/extension
        run: npx @vscode/vsce package --no-dependencies --out prompt-compiler-extension.vsix

      - name: Preflight marketplace publish guard
        id: vsce_preflight
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "VSCE_PAT not configured — skipping marketplace publish."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to VS Code Marketplace
        if: steps.vsce_preflight.outputs.enabled == 'true'
        working-directory: apps/extension
        run: npx @vscode/vsce publish --no-dependencies --pat "$VSCE_PAT"

      - name: Create GitHub Release with VSIX
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: apps/extension/prompt-compiler-extension.vsix
